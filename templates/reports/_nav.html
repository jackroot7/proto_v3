<style>
/* ── Chart containment ── */
.chart-wrap { position:relative; width:100%; }
.chart-wrap canvas { display:block; }

.report-nav { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:14px; }
.report-nav a { padding:6px 14px; border-radius:20px; font-size:12px; text-decoration:none; border:1px solid #e4e4ec; color:#6b6b80; background:#fff; }
.report-nav a.on { background:#6146c1; color:#fff; border-color:#6146c1; font-weight:500; }
.period-bar { display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
.period-bar a { padding:4px 12px; border-radius:6px; font-size:11px; text-decoration:none; border:1px solid #e4e4ec; color:#6b6b80; }
.period-bar a.on { background:#f0edfb; color:#3d2a8f; border-color:#c4b8f0; font-weight:500; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
.kpi { background:#fff; border:1px solid #e4e4ec; border-radius:10px; padding:14px 16px; }
.kpi-label { font-size:10px; color:#6b6b80; text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.kpi-value { font-size:21px; font-weight:700; color:#1a1a2e; line-height:1.1; }
.kpi-sub { font-size:11px; color:#6b6b80; margin-top:3px; }
.up { color:#0D512B; font-weight:500; } .dn { color:#9b2626; font-weight:500; }
</style>

<div class="report-nav">
  <a href="?report=overview&period={{ period }}" class="{% if report == 'overview' %}on{% endif %}">📊 Overview</a>
  <a href="?report=sales&period={{ period }}" class="{% if report == 'sales' %}on{% endif %}">💰 Sales</a>
  <a href="?report=products&period={{ period }}" class="{% if report == 'products' %}on{% endif %}">📦 Products</a>
  <a href="?report=expenses&period={{ period }}" class="{% if report == 'expenses' %}on{% endif %}">💸 Expenses</a>
  <a href="?report=profit&period={{ period }}" class="{% if report == 'profit' %}on{% endif %}">📈 P&amp;L</a>
  <a href="?report=customers&period={{ period }}" class="{% if report == 'customers' %}on{% endif %}">👥 Customers</a>
  <a href="?report=stock&period={{ period }}" class="{% if report == 'stock' %}on{% endif %}">🗄 Stock</a>
  <a href="?report=forecast&period={{ period }}" class="{% if report == 'forecast' %}on{% endif %}">🔮 Forecast</a>
</div>

<div class="period-bar">
  {% for p,l in periods %}<a href="?report={{ report }}&period={{ p }}" class="{% if period == p %}on{% endif %}">{{ l }}</a>{% endfor %}
  <form method="get" style="display:flex;gap:4px;align-items:center;margin-left:4px">
    <input type="hidden" name="report" value="{{ report }}">
    <input type="hidden" name="period" value="custom">
    <input type="date" name="start" value="{{ start }}" style="padding:3px 8px;font-size:11px;border:1px solid #e4e4ec;border-radius:6px">
    <span style="font-size:11px;color:#6b6b80">→</span>
    <input type="date" name="end" value="{{ end }" style="padding:3px 8px;font-size:11px;border:1px solid #e4e4ec;border-radius:6px">
    <button type="submit" class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 10px">Go</button>
  </form>
  <div style="margin-left:auto;display:flex;gap:5px">
    <a href="{% url 'reports:export_csv' %}?report={{ report }}&period={{ period }}&start={{ start }}&end={{ end }}" class="btn btn-outline btn-sm" style="font-size:11px">📊 CSV</a>
    <a href="{% url 'reports:export_excel' %}?report={{ report }}&period={{ period }}&start={{ start }}&end={{ end }}" class="btn btn-outline btn-sm" style="font-size:11px">📗 Excel</a>
    <a href="{% url 'reports:export_pdf' %}?report={{ report }}&period={{ period }}&start={{ start }}&end={{ end }}" class="btn btn-outline btn-sm" style="font-size:11px">📄 PDF</a>
  </div>
</div>
