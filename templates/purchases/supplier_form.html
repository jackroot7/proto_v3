{% extends "base.html" %}
{% block title %}Add Supplier{% endblock %}
{% block page_title %}Add Supplier{% endblock %}
{% block content %}
<div class="card" style="max-width:480px">
  <form method="post">{% csrf_token %}
    {% for field in form %}
    <div class="form-group"><label>{{ field.label }}</label>{{ field }}</div>
    {% endfor %}
    <div style="display:flex;gap:8px"><button type="submit" class="btn btn-primary">Save Supplier</button><a href="{% url 'purchases:suppliers' %}" class="btn btn-outline">Cancel</a></div>
  </form>
</div>
{% endblock %}
