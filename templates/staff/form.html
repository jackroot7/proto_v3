{% extends "base.html" %}
{% block title %}Add Staff{% endblock %}
{% block page_title %}Add Staff Member{% endblock %}
{% block content %}
<div class="card" style="max-width:540px">
  <form method="post">{% csrf_token %}
    {% for field in form %}
    <div class="form-group"><label>{{ field.label }}</label>{{ field }}{% if field.errors %}<div style="font-size:12px;color:#9b2626;margin-top:3px">{{ field.errors.0 }}</div>{% endif %}</div>
    {% endfor %}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Create Staff Account</button>
      <a href="{% url 'staff:list' %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
